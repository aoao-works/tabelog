<!DOCTYPE html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTL Lunch Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>iTL Lunch Navigator😘</h1>
    </header>

    <main>
        <div id="map"></div>

        <div class="container">
            <section id="filter-section">
                <div style="margin-bottom: 12px;">
                    <input type="text" id="search-input" placeholder="店名で検索..."
                        style="width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
                    <select id="genre-filter">
                        <option value="all">全ジャンル</option>
                        <option value="ramen">ラーメン</option>
                        <option value="izakaya">居酒屋</option>
                        <option value="cafe">カフェ</option>
                        <option value="chinese">中華</option>
                        <option value="italian">イタリアン</option>
                        <option value="other">その他</option>
                    </select>
                    <select id="sort-select">
                        <option value="default">並び順（デフォルト）</option>
                        <option value="time-asc">時間が短い順</option>
                        <option value="time-desc">時間が長い順</option>
                        <option value="price-asc">価格が安い順</option>
                        <option value="price-desc">価格が高い順</option>
                        <option value="walking-asc">歩く時間が短い順</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                    <label style="flex: 1; display: flex; align-items: center;">
                        <input type="checkbox" id="within-50-only"> 50分以内のみ表示
                    </label>
                    <button type="button" id="random-btn"
                        style="padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">🎲
                        今日のお店</button>
                    <button type="button" id="reset-btn"
                        style="padding: 10px 15px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">リセット</button>
                </div>
                <div id="result-count" style="font-size: 0.9rem; color: #666; text-align: right;">
                </div>
            </section>

            <section id="restaurant-list">
            </section>

            
        </div>
    </main>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBd7gG5ji3ABVMgw0erWLCxfHCzydLVKd4&callback=initMap"
        async defer></script>
    <script src="app.js"></script>
</body>

</html>
